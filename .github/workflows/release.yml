name: Release

on:
  workflow_dispatch:
    inputs:
      previous-tag:
        description: "Previous tag (optional)"
        required: false
        type: choice
        default: "latest"
        options:
          - "latest"
          - "previous"
          - "beta"

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Run Tests
        run: |
          npm install
          npm run lint
          cd tests/incidents-app && npm install
          cd ../..
          npm run test

      - name: get-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - name: Parse changelog
        id: parse-changelog
        uses: schwma/parse-changelog-action@1c2b2005ccf594cc3a45d33c10af4ab924d3a1c5 # v1.2.0
        with:
          version: "${{ steps.package-version.outputs.current-version }}"
      - name: Create a GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: "v${{ steps.package-version.outputs.current-version }}"
          body: "${{ steps.parse-changelog.outputs.body }}"
      - run: npm publish --access public --provenance --tag ${{ github.event.inputs.previous-tag }}
