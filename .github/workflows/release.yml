name: Release

on:
  workflow_dispatch:
    inputs:
      previous-tag:
        description: "Previous tag (optional)"
        required: false
        type: choice
        default: "latest"
        options:
          - "latest"
          - "previous"
          - "beta"

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Run Tests
        run: |
          npm install
          npm run lint
          cd tests/incidents-app && npm install
          cd ../..
          npm run test

      - name: get-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.2.3
      - name: Parse changelog
        id: parse-changelog
        uses: schwma/parse-changelog-action@69a9f9ab4cf2f2e736108ab41396fc3c55f65e40 # v1.0.0
        with:
          version: "${{ steps.package-version.outputs.current-version }}"
      - name: Create a GitHub release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: "v${{ steps.package-version.outputs.current-version }}"
          body: "${{ steps.parse-changelog.outputs.body }}"
      - run: npm publish --access public --provenance --tag ${{ github.event.inputs.previous-tag }}
